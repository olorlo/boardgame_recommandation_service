<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐할게임?</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=22">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Global Board Background -->
    <div class="global-board-background" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -9999; pointer-events: none; overflow: hidden; background: var(--bg-color);">
        <svg class="board-grid-svg" width="100%" height="100%" style="position: absolute; top: 0; left: 0;">
            <defs>
                <pattern id="board-grid-global" width="80" height="80" patternUnits="userSpaceOnUse">
                    <rect width="80" height="80" fill="none" stroke="var(--primary-color)" stroke-width="2" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#board-grid-global)" opacity="0.12" />
            <rect width="100%" height="100%" fill="none" stroke="var(--primary-color)" stroke-width="40" stroke-dasharray="40 40" opacity="0.08" />
        </svg>
    </div>

    <nav class="retro-titlebar-nav">
        <a href="{% url 'index' %}" class="navbar-brand">
            <i class="fa-solid fa-dice"></i> 뭐할게임?
        </a>
        <div class="navbar-links">
            <a href="{% url 'index' %}" class="retro-btn blue"><i class="fa-solid fa-house"></i> 메인</a>
            <a href="{% url 'community:index' %}" class="retro-btn green"><i class="fa-regular fa-comment"></i> 낙서장</a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' user.pk %}" class="retro-btn yellow"><i class="fa-regular fa-user"></i> {{ user.username }}</a>
                <form action="{% url 'accounts:logout' %}" method="post" class="navbar-logout-form">
                    {% csrf_token %}
                    <button type="submit" class="retro-btn red">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="retro-btn yellow">로그인</a>
                <a href="{% url 'accounts:signup' %}" class="retro-btn red">회원가입</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>


    <!-- Floating Tool Icons (Bottom Right) -->
    <div style="position: fixed; bottom: 30px; right: 30px; z-index: 999; display: flex; flex-direction: column; gap: 20px; pointer-events: none;">
        <!-- Tool 1: Penalty -->
        <div class="floating-tool-icon" style="pointer-events: auto; font-size: 3.5rem; cursor: pointer; line-height: 1; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" onclick="openToolModal('penalty', this)" title="벌칙 뽑기">
            💣
        </div>

        <!-- Tool 2: Turn -->
        <div class="floating-tool-icon" style="pointer-events: auto; font-size: 3.5rem; cursor: pointer; line-height: 1; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" onclick="openToolModal('turn', this)" title="순서 뽑기">
            🪜
        </div>
    </div>

    <style>
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .retro-window {
            background: var(--box-bg) !important;
            border: 3px outset #eadecc !important;
            border-radius: 0 !important;
            padding: 3px !important;
            box-shadow: 6px 6px 0px rgba(93, 63, 46, 0.2) !important;
            max-width: 450px !important;
        }
        .retro-titlebar {
            background: var(--primary-color);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .retro-titlebar-close {
            background: var(--box-bg);
            color: var(--primary-color);
            border: 2px outset #eadecc;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            font-weight: bold;
        }
        .retro-titlebar-close:active {
            border-style: inset;
        }
        .retro-content-inner {
            background: var(--bg-color);
            border: 2px inset #eadecc;
            padding: 20px;
        }
        /* Override base modal close since we have our retro close button */
        .modal-content > .modal-close {
            display: none;
        }
    </style>

    <script>
        function openToolModal(type, element) {
            if (element) {
                element.onmouseover = null;
                element.onmouseout = null;
                element.style.transform = 'scale(1)';
                
                if (type === 'penalty') {
                    element.classList.add('anim-bomb-explode-active');
                    setTimeout(() => {
                        window.location.href = `/?tool=${type}`;
                    }, 500);
                    return;
                } else if (type === 'turn') {
                    element.classList.add('anim-ladder-bounce-active');
                    setTimeout(() => {
                        window.location.href = `/?tool=${type}`;
                    }, 400);
                    return;
                }
            }
            window.location.href = `/?tool=${type}`;
        }
    </script>
</body>
</html>
