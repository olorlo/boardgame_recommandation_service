<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐할게임?</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=21">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="retro-titlebar-nav">
        <a href="{% url 'index' %}" class="navbar-brand">
            <i class="fa-solid fa-dice"></i> 뭐할게임?
        </a>
        <div class="navbar-links">
            <a href="{% url 'index' %}" class="retro-btn blue"><i class="fa-solid fa-house"></i> 메인</a>
            <a href="{% url 'community:index' %}" class="retro-btn green"><i class="fa-regular fa-comment"></i> 낙서장</a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' user.pk %}" class="retro-btn yellow"><i class="fa-regular fa-user"></i> {{ user.username }}</a>
                <a href="{% url 'accounts:account_settings' %}" class="retro-btn blue"><i class="fa-solid fa-gear"></i> 계정 관리</a>
                <form action="{% url 'accounts:logout' %}" method="post" class="navbar-logout-form">
                    {% csrf_token %}
                    <button type="submit" class="retro-btn red">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="retro-btn yellow">로그인</a>
                <a href="{% url 'accounts:signup' %}" class="retro-btn red">회원가입</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>


    <!-- B-grade Retro Ads (Bottom Right) -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 15px; pointer-events: none;">
        <!-- Ad 1: Penalty -->
        <div style="pointer-events: auto; border: 3px outset #eadecc; cursor: pointer; width: 150px; box-sizing: border-box;" onclick="openToolModal('penalty')">
            <div style="background: #fff; border: 2px inset #eadecc; padding: 10px 5px; display: flex; flex-direction: column; align-items: center;">
                <div class="banner-bomb">💣</div>
                <div style="color: var(--primary-color); font-size: 1rem; font-weight: 900; margin-bottom: 10px; line-height: 1.3;">벌칙 정하기!</div>
                <button style="background: var(--accent-color); color: white; border: 2px outset #eadecc; font-size: 0.85rem; font-weight: bold; width: 100%; padding: 4px 0; cursor: pointer; box-shadow: none;">클릭 ➔</button>
            </div>
        </div>

        <!-- Ad 2: Turn -->
        <div style="pointer-events: auto; border: 3px outset #eadecc; cursor: pointer; width: 150px; box-sizing: border-box;" onclick="openToolModal('turn')">
            <div style="background: #fff; border: 2px inset #eadecc; padding: 10px 5px; display: flex; flex-direction: column; align-items: center;">
                <div class="banner-ladder">🪜</div>
                <div style="color: var(--primary-color); font-size: 1rem; font-weight: 900; margin-bottom: 10px; line-height: 1.3;">순서 정하기!</div>
                <button style="background: var(--secondary-color); color: #fff; border: 2px outset #eadecc; font-size: 0.85rem; font-weight: bold; width: 100%; padding: 4px 0; cursor: pointer; box-shadow: none;">클릭 ➔</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .retro-window {
            background: var(--box-bg) !important;
            border: 3px outset #eadecc !important;
            border-radius: 0 !important;
            padding: 3px !important;
            box-shadow: 6px 6px 0px rgba(93, 63, 46, 0.2) !important;
            max-width: 450px !important;
        }
        .retro-titlebar {
            background: var(--primary-color);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .retro-titlebar-close {
            background: var(--box-bg);
            color: var(--primary-color);
            border: 2px outset #eadecc;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            font-weight: bold;
        }
        .retro-titlebar-close:active {
            border-style: inset;
        }
        .retro-content-inner {
            background: var(--bg-color);
            border: 2px inset #eadecc;
            padding: 20px;
        }
        /* Override base modal close since we have our retro close button */
        .modal-content > .modal-close {
            display: none;
        }
    </style>

    <script>
        function openToolModal(type) {
            window.location.href = `/?tool=${type}`;
        }
    </script>
</body>
</html>
